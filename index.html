<!DOCTYPE html>
<html>
<head>
  <title>Live Location Sender</title>
</head>
<body>
  <h2>Sending Live Location...</h2>
  <p id="status">Starting...</p>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxQ3Ovj7IzvhyzvNvV14pgh3tg9fuqKHM84pXoHdkgqaGo4Jll-2xBOTeZ_TS6O0iLI8Q/exec";

    function sendLocation(lat, lng) {
      fetch(`${WEB_APP_URL}?phonelat=${lat}&phonelng=${lng}`)
        .then(res => res.text())
        .then(data => {
          document.getElementById("status").innerText =
            `Sent: ${lat}, ${lng} | Response: ${data}`;
        })
        .catch(err => {
          document.getElementById("status").innerText =
            "Error sending location: " + err;
        });
    }

    function startTracking() {
      if (!navigator.geolocation) {
        document.getElementById("status").innerText =
          "Geolocation not supported on this device.";
        return;
      }

      navigator.geolocation.watchPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          sendLocation(lat, lng);
        },
        function(error) {
          document.getElementById("status").innerText =
            "Location error: " + error.message;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    startTracking();
  </script>
</body>
</html>
