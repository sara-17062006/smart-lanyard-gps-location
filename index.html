<!DOCTYPE html>
<html>
<head>
  <title>Smart Lanyard GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial;
      background: #0a0a1a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    h2 { color: #00d4aa; margin-bottom: 5px; font-size: 22px; }
    p  { color: #888; font-size: 13px; margin-bottom: 25px; }
    .card {
      background: #16213e;
      border-radius: 15px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a2a4a;
      font-size: 14px;
    }
    .label { color: #888; }
    .value { color: #00d4aa; font-weight: bold; }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-start { background: #00d4aa; color: #0a0a1a; }
    .btn-stop  { background: #ff4444; color: white;   }
    .status {
      width: 100%;
      max-width: 400px;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .ok  { background: #0d2b1a; color: #00d4aa; border: 1px solid #00d4aa; }
    .err { background: #2b0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .wait{ background: #1a1a2b; color: #888;    border: 1px solid #333;    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.3; }
    }
    .dot-ok  { background: #00d4aa; }
    .dot-err { background: #ff4444; }
  </style>
</head>
<body>

  <h2>🏷️ Smart Lanyard GPS</h2>
  <p>Sends your real phone GPS to lanyard system</p>

  <div class="status wait" id="statusBox">
    Press Start to begin GPS tracking
  </div>

  <div class="card">
    <div class="row">
      <span class="label">Latitude</span>
      <span class="value" id="lat">--</span>
    </div>
    <div class="row">
      <span class="label">Longitude</span>
      <span class="value" id="lng">--</span>
    </div>
    <div class="row">
      <span class="label">Accuracy</span>
      <span class="value" id="acc">--</span>
    </div>
    <div class="row">
      <span class="label">Last Sent</span>
      <span class="value" id="time">--</span>
    </div>
    <div class="row">
      <span class="label">Send Count</span>
      <span class="value" id="count">0</span>
    </div>
  </div>

  <button class="btn btn-start" onclick="startTracking()">
    ▶ Start GPS Tracking
  </button>
  <button class="btn btn-stop"  onclick="stopTracking()">
    ⏹ Stop Tracking
  </button>

  <script>
    // ← YOUR APPS SCRIPT URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQ3Ovj7IzvhyzvNvV14pgh3tg9fuqKHM84pXoHdkgqaGo4Jll-2xBOTeZ_TS6O0iLI8Q/exec";

    let trackInterval = null;
    let sendCount     = 0;

    function startTracking() {
      setStatus("wait", "🔍 Getting GPS signal...");
      sendLocation();
      trackInterval = setInterval(sendLocation, 15000);
    }

    function stopTracking() {
      if (trackInterval) { clearInterval(trackInterval); trackInterval = null; }
      setStatus("err", "⏹ Tracking stopped");
    }

    function sendLocation() {
      if (!navigator.geolocation) {
        setStatus("err", "❌ GPS not supported on this device");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          const acc = pos.coords.accuracy.toFixed(0);

          document.getElementById("lat").textContent  = lat;
          document.getElementById("lng").textContent  = lng;
          document.getElementById("acc").textContent  = "±" + acc + "m";
          document.getElementById("time").textContent = new Date().toLocaleTimeString();

          fetch(SCRIPT_URL + "?phonelat=" + lat + "&phonelng=" + lng)
            .then(r => r.text())
            .then(t => {
              sendCount++;
              document.getElementById("count").textContent = sendCount;
              setStatus("ok",
                '<span class="dot dot-ok"></span>' +
                "✅ GPS Active — Sending every 15s");
            })
            .catch(err => {
              setStatus("err", "❌ Send failed: " + err.message);
            });
        },
        function(err) {
          setStatus("err", "❌ GPS Error: " + err.message);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function setStatus(type, msg) {
      var box       = document.getElementById("statusBox");
      box.className = "status " + type;
      box.innerHTML = msg;
    }
  </script>
</body>
</html>
